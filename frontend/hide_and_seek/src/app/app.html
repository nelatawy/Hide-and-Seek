<div class="container">
  <div class="blurred-background"></div>
  <div class="clouds">
    <h1>The Lands Between</h1>
  </div>
  <h1 class="title">Hide and Seek</h1>
  <div class="game-container">
    <app-spot-setup></app-spot-setup>
    <app-map *ngIf="mapMode === '2D'"></app-map>
    <app-linear-map *ngIf="mapMode === '1D'"></app-linear-map>

    <!-- Show spot selection before game, show results after game -->
    @if (!solutionExists){
    <app-spot-data></app-spot-data>
    }
  </div>

  @if (solutionExists){
  <div class="results">
    <app-results></app-results>
  </div>
  }
</div>

@if (showFoundPopup) {
<div class="popup-overlay" (click)="closePopup()">
  <div class="popup-panel" (click)="$event.stopPropagation()">
    <h2 class="popup-title">⚔ You've Been Found! ⚔</h2>
    <p class="popup-subtitle">The seeker uncovered your hiding spot!</p>

    <div class="popup-image-frame">
      <img [src]="foundSpotImageUrl" alt="Hiding spot revealed" class="popup-image" />
    </div>

    <div class="popup-timer-row">
      <span class="popup-timer-label">Vanishes in {{popupTimeLeft}}s</span>
      <div class="popup-timer-bar-bg">
        <div class="popup-timer-bar" [style.width.%]="(popupTimeLeft / 5) * 100"></div>
      </div>
    </div>

    <button class="popup-close-btn" (click)="closePopup()">Retreat</button>
  </div>
</div>
}
