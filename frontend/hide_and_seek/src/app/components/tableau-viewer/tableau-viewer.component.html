<div class="viewer-layout">

  <!-- ── Header ── -->
  <div class="viewer-header">
    <div class="step-nav">
      <button class="nav-btn" id="btn-prev" (click)="prev()" [disabled]="currentStep === 0">‹</button>
      <span class="step-counter">Step {{ currentStep + 1 }} of {{ totalSteps }}</span>
      <button class="nav-btn" id="btn-next" (click)="next()" [disabled]="currentStep === totalSteps - 1">›</button>
    </div>
  </div>

  <h1 class="viewer-title">Iteration Tableau</h1>

  <!-- ── Tableau Table ── -->
  <div class="tableau-card">
    <div class="table-wrapper">
      <table class="tableau-table" id="tableau-table">
        <thead>
          <tr>
            <th class="basis-col">Basis</th>
            <th *ngFor="let h of current.headers; let j = index; trackBy: trackByIdx"
              [class.pivot-header]="j === current.pivotCol">
              {{ h }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of current.rows; let i = index; trackBy: trackByIdx" [class.z-row]="isZRow(i)"
            [class.pivot-row]="row.isPivotRow && !isZRow(i)">
            <td class="basis-cell">{{ row.basis }}</td>
            <td *ngFor="let val of row.values; let j = index; trackBy: trackByIdx"
              [class.pivot-cell]="isPivotCell(i, j)" [class.negative]="val < 0 && isZRow(i)">
              {{ formatVal(val) }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Description bar -->
    <div class="description-bar">
      <span class="info-icon">ℹ</span>
      <span class="description-text">{{ current.description }}</span>
    </div>
  </div>

  <!-- ── Objective Value Footer ── -->
  <div class="footer-bar">
    <div class="footer-item">
      <span class="footer-label">Objective Value</span>
      <span class="footer-value">{{ formatVal(current.objectiveValue) }}</span>
    </div>
    <a class="back-link" id="back-to-results" routerLink="/results">← Back to Results</a>
  </div>

</div>
