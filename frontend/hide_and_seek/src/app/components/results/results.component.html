<div class="results-layout">

  <!-- ── Status Header ── -->
  <div class="results-header">
    <div class="status-block">
      <span class="status-badge" [class]="statusClass">{{ status }}</span>
    </div>
    <div class="obj-value-block">
      <span class="obj-label">Objective Value</span>
      <span class="obj-value">{{ objectiveValue | number: '1.2-4' }}</span>
    </div>
  </div>

  <!-- ── Status Message (INFEASIBLE / UNBOUNDED) ── -->
  <div class="status-message" [class]="statusClass" *ngIf="statusMessage">
    <span class="msg-icon">⚠</span>
    <span>{{ statusMessage }}</span>
  </div>

  <!-- ── Main Grid ── -->
  <div class="results-grid">

    <!-- Variable States -->
    <div class="card var-card">
      <div class="card-header">
        <h2 class="card-title">Final Variable States</h2>
      </div>

      <table class="var-table" id="var-table">
        <thead>
          <tr>
            <th>Variable</th>
            <th>Type</th>
            <th class="num-col">Value</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of variableValues; let i = index" [class.decision-row]="v.type === 'Decision'">
            <td class="var-name">{{ v.name }}</td>
            <td><span class="type-pill" [class]="v.type.toLowerCase()">{{ v.type }}</span></td>
            <td class="num-col value-cell">{{ v.value | number: '1.4-4' }}</td>
          </tr>
        </tbody>
      </table>

      <!-- <a class="steps-link" id="view-steps-link" routerLink="/results/steps">
        View Step-by-Step Tableaux
        <span class="arrow">→</span>
      </a> -->
    </div>

  </div>

  <!-- Back to Solver -->
  <a class="back-link" id="back-to-solver" routerLink="/solver">
    ← Back to Solver
  </a>

</div>
